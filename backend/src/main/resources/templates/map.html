<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naver Map Example</title>
    <script type="text/javascript" src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=YOUR_NAVER_MAP_CLIENT_ID"></script>
</head>
<body>
<h1>Naver Map Example</h1>
<button onclick="searchPopup()">팝업 스토어 검색</button>
<div id="map" style="width: 100%; height: 400px;"></div>

<script>
    var mapOptions = {
        center: new naver.maps.LatLng(37.5665, 126.9780),
        zoom: 10
    };

    var map = new naver.maps.Map('map', mapOptions);

    function searchPopup() {
        fetch('/naver/search/popup')
            .then(response => response.json())
            .then(data => {
                var parsedData = JSON.parse(data);
                displayMarkers(parsedData.items);
            })
            .catch(error => console.error('Error:', error));
    }

    function displayMarkers(items) {
        items.forEach(item => {
            var marker = new naver.maps.Marker({
                position: new naver.maps.LatLng(item.mapy / 1e6, item.mapx / 1e6),
                map: map,
                title: item.title
            });

            var infowindow = new naver.maps.InfoWindow({
                content: `<div><h4>${item.title}</h4><p>${item.address}</p></div>`
            });

            naver.maps.Event.addListener(marker, 'click', function() {
                infowindow.open(map, marker);
            });
        });
    }
</script>
</body>
</html>
